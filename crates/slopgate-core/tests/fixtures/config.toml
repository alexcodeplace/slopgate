roots = ["src"]
exts = [".ts", ".tsx", ".astro"]
skipDirs = ["node_modules", "dist", "tests", ".worktrees"]
baseline = ["no-stubs", "ts-suppress", "as-any"]
rules = []
astRules = "./rules/ast"
astDisable = []
suppressions = "./suppressions.json"
fixtures = "./fixtures"

[checkers.diff-shape]
maxDirs = 5

[gate]
file = ["critical", "high"]
staged = ["critical", "high"]
