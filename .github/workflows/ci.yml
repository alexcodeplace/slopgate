name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - name: Build engine
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu -p slopgate-rs
      - name: Stage binary into vendor/
        run: node scripts/build-npm-packages.mjs --stage linux-x64
      - run: npm run self-test
      - run: npm test
